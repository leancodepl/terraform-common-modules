name: Terraform Common Modules Validate

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.tf"
      - "**/.trivyignore"
      - ".github/workflows/ci-build.yaml"
  push:
    branches: [main]
    paths:
      - "**/*.tf"
      - "**/.trivyignore"
      - ".github/workflows/ci-build.yaml"

env:
  TERRAFORM_VERSION: 1.14.0
  TFLINT_VERSION: 0.60.0
  TRIVY_VERSION: 0.69.1

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      directories: ${{ steps.changed.outputs.all_changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed directories
        id: changed
        uses: tj-actions/changed-files@v47
        with:
          dir_names: true
          dir_names_max_depth: 1
          files: |
            **/*.tf
            **/.trivyignore
          files_ignore: |
            .github/**
          matrix: true

  validate:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.directories != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory: ${{ fromJson(needs.detect-changes.outputs.directories) }}
    name: Validate ${{ matrix.directory }}
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false -input=false -no-color

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Format Check
        run: terraform fmt -recursive -check -diff

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v${{ env.TFLINT_VERSION }}
          github_token: ${{ github.token }}

      - name: TFLint Init
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: TFLint
        run: tflint --recursive --config "${{ github.workspace }}/.tflint.hcl"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.3
        with:
          version: v${{ env.TRIVY_VERSION }}
          cache: true
          token: ${{ github.token }}

      - name: Trivy Security Scan
        run: trivy config --exit-code 1 .
